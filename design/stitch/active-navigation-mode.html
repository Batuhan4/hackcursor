<style>
        .map-bg {
            background-color: #f0f2f5;
            background-image: radial-gradient(circle at 50% 50%, rgba(200, 205, 210, 0.4) 1px, transparent 1px);
            background-size: 24px 24px;
        }
        .route-line {
            stroke-dasharray: 8;
            animation: dash 20s linear infinite;
        }
        @keyframes dash {
            to {
                stroke-dashoffset: -1000;
            }
        }
        .node-pulse-high {
            animation: pulse-high 2s infinite cubic-bezier(0.4, 0, 0.6, 1);
        }
        @keyframes pulse-high {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: .7; transform: scale(1.1); box-shadow: 0 0 20px 5px rgba(109, 254, 156, 0.4); }
        }
        .node-pulse-neutral {
            animation: pulse-neutral 3s infinite cubic-bezier(0.4, 0, 0.6, 1);
        }
        @keyframes pulse-neutral {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: .8; transform: scale(1.05); box-shadow: 0 0 15px 3px rgba(75, 146, 230, 0.3); }
        }
        
        /* Glassmorphism Utilities */
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
        }
        .glass-panel-subtle {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        /* Transition Dampening */
        .calm-ease {
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background font-body-lg h-screen w-screen overflow-hidden relative antialiased selection:bg-secondary-container selection:text-on-secondary-container">
<!-- Active Navigation Intent: Suppressing TopAppBar and BottomNavBar as per Source of Truth Hierarchy -> Contextual Logic -->
<!-- Map Canvas Level 0 -->
<div class="absolute inset-0 z-0 map-bg">
<!-- Abstract Vector Route Representation -->
<svg class="absolute w-full h-full" xmlns="http://www.w3.org/2000/svg">
<path class="route-line" d="M 100,800 Q 200,600 400,500 T 700,300 T 900,100" fill="none" stroke="#00142c" stroke-linecap="round" stroke-width="4"></path>
<path class="route-line" d="M 100,800 Q 200,600 400,500 T 700,300 T 900,100" fill="none" opacity="0.4" stroke="#bcc7de" stroke-linecap="round" stroke-width="8"></path>
</svg>
<!-- Safety Nodes Level 3 -->
<!-- High Safety Node -->
<div class="absolute top-[48%] left-[40%] transform -translate-x-1/2 -translate-y-1/2 z-10">
<div class="relative flex items-center justify-center">
<div class="absolute w-12 h-12 bg-secondary-container/30 rounded-full blur-md node-pulse-high"></div>
<div class="w-4 h-4 bg-secondary rounded-full border-2 border-white shadow-sm z-10"></div>
</div>
</div>
<!-- Neutral Safety Node -->
<div class="absolute top-[28%] left-[75%] transform -translate-x-1/2 -translate-y-1/2 z-10">
<div class="relative flex items-center justify-center">
<div class="absolute w-10 h-10 bg-on-tertiary-container/20 rounded-full blur-md node-pulse-neutral"></div>
<div class="w-3 h-3 bg-on-tertiary-container rounded-full border-2 border-white shadow-sm z-10"></div>
</div>
</div>
<!-- Current Location Marker -->
<div class="absolute bottom-[20%] left-[12%] transform -translate-x-1/2 -translate-y-1/2 z-10">
<div class="relative flex items-center justify-center">
<div class="w-6 h-6 bg-primary rounded-full border-4 border-white shadow-md z-10 flex items-center justify-center">
<div class="w-1.5 h-1.5 bg-white rounded-full"></div>
</div>
</div>
</div>
</div>
<!-- Top Status Bar - Level 2 (Active Sheets) -->
<header class="fixed top-0 left-0 w-full z-40 p-container-padding-mobile md:p-container-padding-desktop pointer-events-none">
<div class="glass-panel rounded-xl px-4 py-3 flex items-center justify-between pointer-events-auto max-w-md mx-auto md:max-w-none md:w-auto md:inline-flex md:gap-8">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-secondary-container/20 flex items-center justify-center text-secondary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">shield_with_heart</span>
</div>
<div>
<h1 class="font-headline-md text-headline-md text-primary m-0">Güvenli Yolculuk Aktif</h1>

</div>
</div>

<span class="material-symbols-outlined">notifications_paused</span>
</button>
</div>
</header>
<!-- Contextual Controls - Floating Architecture -->

<button aria-label="Haritayı Odakla" class="glass-panel-subtle w-12 h-12 rounded-full flex items-center justify-center text-on-surface-variant hover:text-primary transition-colors calm-ease shadow-sm">
<span class="material-symbols-outlined">my_location</span>
</button>
<button aria-label="Rotayı Yeniden Hesapla" class="glass-panel-subtle w-12 h-12 rounded-full flex items-center justify-center text-on-surface-variant hover:text-primary transition-colors calm-ease shadow-sm">
<span class="material-symbols-outlined">route</span>
</button>
</div>
<!-- Bottom Action Area - Level 2 (Active Sheets) -->
<div class="fixed bottom-0 left-0 w-full z-40 p-container-padding-mobile md:p-container-padding-desktop pb-8 bg-gradient-to-t from-white/60 to-transparent">
<div class="max-w-lg mx-auto flex flex-col gap-4">
<!-- Floating Suggestion Card -->
<div class="glass-panel rounded-2xl p-4 calm-ease transform scale-98 animate-[slideUp_0.5s_cubic-bezier(0.2,0.8,0.2,1)_forwards]">
<div class="flex items-start gap-4">
<div class="w-12 h-12 rounded-xl bg-tertiary-container text-on-tertiary flex items-center justify-center shrink-0">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">local_cafe</span>
</div>
<div class="flex-1 min-w-0 pt-0.5">
<div class="flex items-center justify-between gap-2 mb-1">
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider">Yol Üstü Güvenli Öneri</span>
<div class="flex items-center gap-1 bg-secondary-container/30 px-2 py-0.5 rounded-full">
<span class="w-1.5 h-1.5 rounded-full bg-secondary"></span>
<span class="font-mono-data text-mono-data text-secondary">%92 Güvenli</span>
</div>
</div>
<p class="font-body-lg text-body-lg text-primary m-0 leading-tight">2 dk sonra güvenli durak: <strong class="font-semibold">Kahve Dünyası</strong></p>
</div>
</div>
</div>
<!-- Primary Safety Action -->
<button class="w-full bg-primary/95 backdrop-blur-md text-on-primary font-headline-md text-headline-md py-4 rounded-xl shadow-lg flex items-center justify-center gap-3 hover:bg-primary transition-colors calm-ease border border-white/10 active:scale-[0.98]">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                 Yolculuğu Tamamla
            </button>
</div>
</div>
<style>
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
    </style>
