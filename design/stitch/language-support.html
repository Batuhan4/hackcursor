<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Yoldost - Global Language Support</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<style>
        @import url('https://fonts.googleapis.com/css2?family=Geist:wght@500;600&family=Inter:wght@400;500;600&display=swap');
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-highest": "#e0e3e5",
                        "surface-dim": "#d8dadc",
                        "primary-container": "#1e293b",
                        "on-primary-fixed": "#111c2d",
                        "outline-variant": "#c5c6cd",
                        "on-secondary-container": "#007439",
                        "surface-container-lowest": "#ffffff",
                        "outline": "#75777d",
                        "on-primary": "#ffffff",
                        "on-primary-container": "#8590a6",
                        "primary": "#091426",
                        "on-error-container": "#93000a",
                        "surface-container-high": "#e6e8ea",
                        "tertiary": "#00142c",
                        "surface-variant": "#e0e3e5",
                        "tertiary-fixed": "#d4e3ff",
                        "primary-fixed": "#d8e3fb",
                        "secondary-fixed-dim": "#4de082",
                        "secondary-container": "#6dfe9c",
                        "primary-fixed-dim": "#bcc7de",
                        "surface-tint": "#545f73",
                        "on-secondary": "#ffffff",
                        "on-tertiary-container": "#4b92e6",
                        "inverse-primary": "#bcc7de",
                        "on-surface-variant": "#45474c",
                        "on-secondary-fixed-variant": "#005227",
                        "surface-container": "#eceef0",
                        "inverse-surface": "#2d3133",
                        "tertiary-fixed-dim": "#a4c9ff",
                        "on-tertiary": "#ffffff",
                        "inverse-on-surface": "#eff1f3",
                        "error-container": "#ffdad6",
                        "secondary": "#006d36",
                        "on-error": "#ffffff",
                        "surface-container-low": "#f2f4f6",
                        "tertiary-container": "#00294f",
                        "on-surface": "#191c1e",
                        "on-secondary-fixed": "#00210c",
                        "on-tertiary-fixed": "#001c39",
                        "on-background": "#191c1e",
                        "surface": "#f7f9fb",
                        "on-tertiary-fixed-variant": "#004883",
                        "on-primary-fixed-variant": "#3c475a",
                        "secondary-fixed": "#6dfe9c",
                        "error": "#ba1a1a",
                        "surface-bright": "#f7f9fb",
                        "background": "#f7f9fb"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "1rem",
                        "stack-gap-lg": "1.5rem",
                        "container-padding-mobile": "1.25rem",
                        "stack-gap-md": "1rem",
                        "container-padding-desktop": "2rem",
                        "unit": "8px",
                        "stack-gap-sm": "0.5rem"
                    },
                    "fontFamily": {
                        "mono-data": ["Geist"],
                        "headline-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "body-sm": ["Inter"],
                        "label-caps": ["Geist"]
                    },
                    "fontSize": {
                        "mono-data": ["13px", {"lineHeight": "16px", "letterSpacing": "0em", "fontWeight": "500"}],
                        "headline-md": ["20px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "500"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "letterSpacing": "0em", "fontWeight": "400"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "body-sm": ["14px", {"lineHeight": "20px", "letterSpacing": "0em", "fontWeight": "400"}],
                        "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}]
                    }
                }
            }
        }
    </script>
<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
        }
        
        .map-bg {
            background-image: radial-gradient(circle at 50% 50%, rgba(77, 163, 255, 0.05) 0%, rgba(245, 247, 250, 0) 70%);
        }

        .float-animation {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .language-item {
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .language-item:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen overflow-x-hidden selection:bg-secondary-container selection:text-on-secondary-container">
<!-- TopAppBar Semantic Shell -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-5 py-4 bg-surface/40 dark:bg-surface/40 backdrop-blur-xl shadow-sm md:hidden">
<button class="text-primary dark:text-primary-fixed hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined" style="font-variation-settings: &quot;FILL&quot; 1;">shield_with_heart</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed">Yoldost</h1>
<button class="text-primary dark:text-primary-fixed hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined">account_circle</span>
</button>
</header>
<main class="pt-24 pb-32 px-container-padding-mobile min-h-screen flex flex-col items-center relative map-bg">
<!-- Background Abstract Globe lines -->
<div class="absolute inset-0 z-0 overflow-hidden pointer-events-none opacity-40">
<svg class="w-full h-full text-surface-dim" viewBox="0 0 400 800">
<path class="opacity-50" d="M50 200 Q 200 100 350 200 T 200 400" fill="none" stroke="currentColor" stroke-dasharray="4 4" stroke-width="1"></path>
<path class="opacity-50" d="M50 300 Q 200 200 350 300 T 200 500" fill="none" stroke="currentColor" stroke-dasharray="4 4" stroke-width="1"></path>
<path class="opacity-20" d="M100 100 Q 300 200 100 300 T 100 500" fill="none" stroke="#2F6F5E" stroke-width="1"></path>
<path class="opacity-20" d="M300 150 Q 100 250 300 350 T 300 550" fill="none" stroke="#4DA3FF" stroke-width="1"></path>
</svg>
</div>
<!-- Header Section -->
<div class="z-10 text-center mb-stack-gap-lg mt-stack-gap-lg max-w-sm">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-[#102A43] mb-stack-gap-sm tracking-tight leading-tight">Yoldost speaks every language</h2>

</div>
<!-- Language Cards Grid -->
<div class="z-10 w-full max-w-sm flex flex-col gap-unit relative">
<!-- Mascot Positioned Absolute -->
<div class="absolute -right-4 -top-16 w-24 h-24 z-20 float-animation pointer-events-none">
<img alt="Mascot Dost looking towards language cards" class="w-full h-full object-contain drop-shadow-xl" src="https://lh3.googleusercontent.com/aida/AP1WRLsnFMsOfPumOah2RqLecXBC4mB-Ztg844P64En_kOySq2JZTlyH43bCVeF-CWC9Fpfp8ltbJm9zd-vyCN2Z8CEJSIAVZSvHXDq8HibYGgb690e5N1yRO949vRPWK72o-7LLYy4gMaV0Pv6-3IwMS55eB1TlJ1VNDHMa2pyIlVyiyGoqbyWeW8eleUUvzSGLwhC2jLF9bDL0febbyJcSbFRmByolnTl8Ht6P9F_0K8pbVEWCaMArW4GoiYeA">
</div>
<!-- Turkish -->
<div class="glass-card rounded-[20px] p-4 flex items-center gap-4 language-item cursor-pointer">
<div class="w-10 h-10 rounded-full bg-surface-container-low flex items-center justify-center shrink-0 border border-outline-variant/30">
<span class="text-xl">🇹🇷</span>
</div>
<div>
<p class="font-body-sm text-body-sm text-on-surface-variant mb-0.5">Turkish</p>
<p class="font-body-lg text-body-lg text-on-surface font-medium">Nereye gitmek istiyorsun?</p>
</div>
</div>
<!-- English -->
<div class="glass-card rounded-[20px] p-4 flex items-center gap-4 language-item cursor-pointer ml-4">
<div class="w-10 h-10 rounded-full bg-surface-container-low flex items-center justify-center shrink-0 border border-outline-variant/30">
<span class="text-xl">🇬🇧</span>
</div>
<div>
<p class="font-body-sm text-body-sm text-on-surface-variant mb-0.5">English</p>
<p class="font-body-lg text-body-lg text-on-surface font-medium">Where do you want to go?</p>
</div>
</div>
<!-- Spanish -->
<div class="glass-card rounded-[20px] p-4 flex items-center gap-4 language-item cursor-pointer">
<div class="w-10 h-10 rounded-full bg-surface-container-low flex items-center justify-center shrink-0 border border-outline-variant/30">
<span class="text-xl">🇪🇸</span>
</div>
<div>
<p class="font-body-sm text-body-sm text-on-surface-variant mb-0.5">Spanish</p>
<p class="font-body-lg text-body-lg text-on-surface font-medium">¿A dónde quieres ir?</p>
</div>
</div>
<!-- French -->
<div class="glass-card rounded-[20px] p-4 flex items-center gap-4 language-item cursor-pointer ml-4">
<div class="w-10 h-10 rounded-full bg-surface-container-low flex items-center justify-center shrink-0 border border-outline-variant/30">
<span class="text-xl">🇫🇷</span>
</div>
<div>
<p class="font-body-sm text-body-sm text-on-surface-variant mb-0.5">French</p>
<p class="font-body-lg text-body-lg text-on-surface font-medium">Où veux-tu aller?</p>
</div>
</div>
<!-- German -->
<div class="glass-card rounded-[20px] p-4 flex items-center gap-4 language-item cursor-pointer">
<div class="w-10 h-10 rounded-full bg-surface-container-low flex items-center justify-center shrink-0 border border-outline-variant/30">
<span class="text-xl">🇩🇪</span>
</div>
<div>
<p class="font-body-sm text-body-sm text-on-surface-variant mb-0.5">German</p>
<p class="font-body-lg text-body-lg text-on-surface font-medium">Wohin möchtest du gehen?</p>
</div>
</div>
<!-- Arabic -->
<div class="glass-card rounded-[20px] p-4 flex items-center gap-4 language-item cursor-pointer ml-4">
<div class="w-10 h-10 rounded-full bg-surface-container-low flex items-center justify-center shrink-0 border border-outline-variant/30">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: &quot;FILL&quot; 0;">globe</span>
</div>
<div class="flex-1" dir="rtl">
<p class="font-body-sm text-body-sm text-on-surface-variant mb-0.5 text-right">Arabic</p>
<p class="font-body-lg text-body-lg text-on-surface font-medium text-right">إلى أين تريد أن تذهب؟</p>
</div>
</div>
</div>
</main>
<!-- BottomNavBar Semantic Shell -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-2 bg-surface/80 dark:bg-inverse-surface/80 backdrop-blur-2xl shadow-[0_-8px_32px_rgba(0,0,0,0.04)] rounded-t-xl md:hidden">
<button class="flex flex-col items-center justify-center text-on-surface-variant/70 p-2 hover:bg-surface-container-high/50 transition-colors">
<span class="material-symbols-outlined mb-1">navigation</span>
<span class="font-label-caps text-label-caps">Journey</span>
</button>
<button class="flex flex-col items-center justify-center text-secondary dark:text-secondary-fixed bg-secondary-container/20 rounded-xl p-2 hover:bg-surface-container-high/50 transition-colors" style="transform: scale(0.95); transition: transform 0.3s;">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: &quot;FILL&quot; 1;">explore</span>
<span class="font-label-caps text-label-caps">Explore</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant/70 p-2 hover:bg-surface-container-high/50 transition-colors">
<span class="material-symbols-outlined mb-1">person</span>
<span class="font-label-caps text-label-caps">Profile</span>
</button>
</nav>


</body></html>
