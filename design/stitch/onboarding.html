        /* Subtle Entrance Animation */
        .fade-in-up {
            opacity: 0;

        }
        .fade-in-up.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .ambient-glow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

        // Simple entrance orchestration to reinforce the "Calm Digital Guide" philosophy
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => { document.getElementById('anim-1').classList.add('visible'); }, 100);
            setTimeout(() => { document.getElementById('anim-2').classList.add('visible'); }, 300);
            setTimeout(() => { document.getElementById('anim-3').classList.add('visible'); }, 500);
        });
