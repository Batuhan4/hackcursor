<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>

<title>Yoldost - Live Navigation</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                                    "letterSpacing": "-0.02em",

      }

<style>
        /* Custom glow utilities */
        .glow-safe {
            box-shadow: 0 0 12px 2px rgba(174, 240, 218, 0.4); /* tertiary-fixed approximation */
        }
        .glow-route {
            box-shadow: 0 0 12px 2px rgba(176, 201, 232, 0.4); /* secondary approximation */
        }
        .map-bg {
            background-color: #0b1220;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(176, 201, 232, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 20% 80%, rgba(174, 240, 218, 0.05) 0%, transparent 40%);
        }
        
        /* Map Lines Simulation */
        .map-grid {
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        }

        /* Pulse Animation for Mascot */
        @keyframes pulse-soft {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }
        .animate-pulse-soft {
            animation: pulse-soft 3s ease-in-out infinite;
        }
        
        /* Floating Animation */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }
    </style>
</head>
<body class="bg-background text-on-background antialiased min-h-screen overflow-hidden selection:bg-secondary/30">
<!-- TopAppBar -->
<header class="fixed top-0 w-full backdrop-blur-xl bg-surface/40 dark:bg-primary/40 shadow-sm z-50">
<!-- Separation logic applied via shadow and tonal shift, skipping top/bottom borders per rules -->
<div class="flex justify-between items-center px-[24px] h-16 max-w-7xl mx-auto">
<button aria-label="Menu" class="scale-95 active:scale-90 transition-transform duration-200 text-on-surface-variant dark:text-outline-variant hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">menu</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary dark:text-secondary-fixed tracking-tight">Yoldost</h1>
<button aria-label="User profile avatar" class="scale-95 active:scale-90 transition-transform duration-200 hover:opacity-80 transition-opacity rounded-full overflow-hidden w-8 h-8 ring-2 ring-transparent focus:ring-secondary/50 outline-none">
<div class="w-full h-full bg-surface-variant flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined text-sm">person</span>
</div>
</button>
</div>
</header>
<!-- Main Map Canvas -->
<main class="relative w-full h-screen map-bg map-grid pt-16 pb-24 md:pb-0 overflow-hidden">
<!-- SVG Vector Map Route Line -->
<svg class="absolute inset-0 w-full h-full pointer-events-none z-0" preserveaspectratio="none" viewbox="0 0 100 100">
<!-- Simulated Route Path -->
<path class="opacity-70 drop-shadow-[0_0_8px_rgba(176,201,232,0.5)]" d="M 20 80 Q 40 70, 50 50 T 80 20" fill="none" stroke="rgba(176, 201, 232, 0.6)" stroke-linecap="round" stroke-linejoin="round" stroke-width="0.8"></path>
</svg>
<!-- Safe Stop Nodes -->
<!-- Inactive Node -->
<div class="absolute top-[80%] left-[20%] w-4 h-4 -ml-2 -mt-2 bg-on-surface-variant/40 rounded-full z-10 backdrop-blur-md border border-white/10"></div>
<!-- In-Route Node -->
<div class="absolute top-[50%] left-[50%] w-4 h-4 -ml-2 -mt-2 bg-secondary rounded-full z-10 glow-route ring-2 ring-background border border-secondary/50 flex items-center justify-center">
<div class="w-1.5 h-1.5 bg-white rounded-full"></div>
</div>
<!-- Active Safe Destination -->
<div class="absolute top-[20%] left-[80%] w-6 h-6 -ml-3 -mt-3 bg-tertiary-fixed rounded-full z-10 glow-safe ring-4 ring-background/80 border border-tertiary-fixed/80 flex items-center justify-center animate-pulse-soft">
<span class="material-symbols-outlined text-[12px] text-on-tertiary-fixed" style="font-variation-settings: 'FILL' 1;">shield_moon</span>
</div>
<!-- Current Location Indicator -->
<div class="absolute top-[70%] left-[35%] w-8 h-8 -ml-4 -mt-4 z-20">
<div class="relative w-full h-full flex items-center justify-center">
<div class="absolute inset-0 bg-secondary/30 rounded-full animate-ping opacity-75"></div>
<div class="w-4 h-4 bg-secondary rounded-full shadow-[0_0_15px_rgba(176,201,232,0.8)] border-2 border-background z-10"></div>
<!-- Direction Arrow -->
<div class="absolute -top-1 w-0 h-0 border-l-[6px] border-l-transparent border-r-[6px] border-r-transparent border-b-[8px] border-b-secondary transform rotate-45 origin-bottom"></div>
</div>
</div>
<!-- Floating Mascot Overlay -->
<div class="absolute top-24 right-container-padding z-30 animate-float pointer-events-none">
<div class="relative">
<!-- Glowing Aura -->
<div class="absolute inset-0 bg-tertiary-fixed/20 rounded-2xl blur-xl animate-pulse-soft"></div>
<!-- Mascot Container (Glassmorphic) -->
<div class="relative bg-surface/80 backdrop-blur-[20px] p-2 rounded-2xl border border-white/10 shadow-lg flex items-center justify-center transform -rotate-6">
<img alt="" class="w-16 h-16 object-contain drop-shadow-md" src="https://lh3.googleusercontent.com/aida/AP1WRLsnFMsOfPumOah2RqLecXBC4mB-Ztg844P64En_kOySq2JZTlyH43bCVeF-CWC9Fpfp8ltbJm9zd-vyCN2Z8CEJSIAVZSvHXDq8HibYGgb690e5N1yRO949vRPWK72o-7LLYy4gMaV0Pv6-3IwMS55eB1TlJ1VNDHMa2pyIlVyiyGoqbyWeW8eleUUvzSGLwhC2jLF9bDL0febbyJcSbFRmByolnTl8Ht6P9F_0K8pbVEWCaMArW4GoiYeA"/>
</div>
</div>
</div>
<!-- Floating Navigation Info Card -->
<div class="absolute top-24 left-container-padding z-30 max-w-[200px]">
<div class="bg-surface/80 backdrop-blur-[20px] rounded-xl border border-white/10 shadow-lg overflow-hidden">
<div class="p-4">
<div class="flex items-center space-x-2 text-tertiary-fixed mb-1">
<span class="material-symbols-outlined text-sm">turn_right</span>
<span class="font-headline-md text-headline-md">1.2 mi</span>
</div>
<p class="font-body-sm text-body-sm text-on-surface-variant">Turn right onto Neon Ave, heading towards Safe Zone A.</p>
</div>
<!-- Progress Bar -->
<div class="h-1 w-full bg-surface-variant">
<div class="h-full bg-secondary w-1/3"></div>
</div>
</div>
</div>
<!-- Bottom Sheet (Navigation Details) -->
<div class="absolute bottom-0 left-0 w-full z-40 bg-surface/80 backdrop-blur-[24px] rounded-t-[24px] border-t border-white/10 shadow-[0_-8px_32px_rgba(0,0,0,0.2)] md:hidden">
<!-- Grabber -->
<div class="w-full flex justify-center pt-3 pb-1">
<div class="w-12 h-1.5 bg-on-surface-variant/30 rounded-full"></div>
</div>
<div class="px-container-padding pb-safe-area-inset-bottom pt-4 pb-20">
<div class="flex justify-between items-end mb-6">
<div>
<h2 class="font-display-lg-mobile text-display-lg-mobile text-on-surface">14 min</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-1">2.4 miles • Arrival at 23:45</p>
</div>
<button aria-label="End Route" class="w-12 h-12 rounded-full bg-error/10 text-error flex items-center justify-center hover:bg-error/20 transition-colors border border-error/20">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<div class="flex space-x-4">
<button class="flex-1 bg-secondary text-on-secondary font-label-caps text-label-caps h-12 rounded-xl flex items-center justify-center hover:opacity-90 transition-opacity">
<span class="material-symbols-outlined mr-2 text-[18px]">emergency_share</span>
                        SHARE ETA
                    </button>
</div>
</div>
</div>
<!-- Desktop Navigation Details Panel (Hidden on Mobile) -->
<div class="hidden md:flex absolute top-24 left-container-padding z-30 w-[320px] flex-col gap-4 mt-24">
<div class="bg-surface/80 backdrop-blur-[24px] rounded-[24px] border border-white/10 shadow-xl overflow-hidden p-6">
<h2 class="font-display-lg text-display-lg text-on-surface mb-2">14 min</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant mb-6">2.4 miles • Arrival at 23:45</p>
<div class="flex space-x-4 mb-6">
<button class="flex-1 bg-secondary text-on-secondary font-label-caps text-label-caps h-12 rounded-xl flex items-center justify-center hover:opacity-90 transition-opacity">
<span class="material-symbols-outlined mr-2 text-[18px]">emergency_share</span>
                        SHARE ETA
                    </button>
<button aria-label="End Route" class="w-12 h-12 rounded-xl bg-error/10 text-error flex items-center justify-center hover:bg-error/20 transition-colors border border-error/20">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<div class="space-y-4">
<div class="flex items-start gap-3">
<div class="mt-1 w-6 h-6 rounded-full bg-secondary/20 flex items-center justify-center flex-shrink-0">
<span class="material-symbols-outlined text-[14px] text-secondary">turn_right</span>
</div>
<div>
<p class="font-body-lg text-body-lg text-on-surface">In 1.2 mi</p>
<p class="font-body-sm text-body-sm text-on-surface-variant">Turn right onto Neon Ave</p>
</div>
</div>
<div class="flex items-start gap-3 opacity-60">
<div class="mt-1 w-6 h-6 rounded-full bg-surface-variant flex items-center justify-center flex-shrink-0">
<span class="material-symbols-outlined text-[14px] text-on-surface-variant">straight</span>
</div>
<div>
<p class="font-body-lg text-body-lg text-on-surface">In 2.0 mi</p>
<p class="font-body-sm text-body-sm text-on-surface-variant">Continue straight past the plaza</p>
</div>
</div>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<!-- Note: While usually navigation might be suppressed on a live route screen in some apps, 
         the prompt explicitly requests rendering predicted components as guidance. 
         Assuming this is a main 'Routes' dashboard view with live active state.
         Setting 'Routes' as active. -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center pt-3 pb-safe-area-inset-bottom bg-surface/60 dark:bg-primary/60 rounded-t-xl backdrop-blur-2xl shadow-[0_-8px_32px_rgba(0,0,0,0.04)] md:hidden">
<!-- Separation logic applied via shadow/bg, skipping top border per rules -->
<button aria-label="Guide" class="flex flex-col items-center justify-center text-on-surface-variant/60 dark:text-outline-variant/60 hover:text-secondary transition-colors scale-110 duration-300 ease-[cubic-bezier(0.2,0.8,0.2,1)]">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 0;">explore</span>
<span class="font-label-caps text-label-caps">Guide</span>
</button>
<button aria-label="Routes" class="flex flex-col items-center justify-center text-secondary dark:text-secondary-fixed font-bold hover:text-secondary transition-colors scale-110 duration-300 ease-[cubic-bezier(0.2,0.8,0.2,1)]">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">navigation</span>
<span class="font-label-caps text-label-caps">Routes</span>
</button>
<button aria-label="Stops" class="flex flex-col items-center justify-center text-on-surface-variant/60 dark:text-outline-variant/60 hover:text-secondary transition-colors scale-110 duration-300 ease-[cubic-bezier(0.2,0.8,0.2,1)]">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 0;">shield_moon</span>
<span class="font-label-caps text-label-caps">Stops</span>
</button>
<button aria-label="Vault" class="flex flex-col items-center justify-center text-on-surface-variant/60 dark:text-outline-variant/60 hover:text-secondary transition-colors scale-110 duration-300 ease-[cubic-bezier(0.2,0.8,0.2,1)]">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 0;">local_offer</span>
<span class="font-label-caps text-label-caps">Vault</span>
</button>
</nav>
<style>
        /* Safe area inset utilities for iOS devices */
        .pb-safe-area-inset-bottom {
            padding-bottom: env(safe-area-inset-bottom, 16px);
        }
    </style>
</body></html>
