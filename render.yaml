services:
  - type: web
    name: omnisight-api
    runtime: go
    plan: free
    region: frankfurt
    repo: https://github.com/Batuhan4/hackcursor
    branch: main
    rootDir: services/api
    buildCommand: go build -o bin/server ./cmd/server
    startCommand: ./bin/server
    healthCheckPath: /health/live
    autoDeployTrigger: commit
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
